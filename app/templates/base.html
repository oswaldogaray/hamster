<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <meta name="color-scheme" content="dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Plus Jakarta Sans", "ui-sans-serif", "sans-serif"],
                        display: ["Space Grotesk", "ui-sans-serif", "sans-serif"]
                    },
                    colors: {
                        brand: {
                            50: "#eff6ff",
                            100: "#dbeafe",
                            200: "#bfdbfe",
                            300: "#93c5fd",
                            400: "#60a5fa",
                            500: "#3b82f6",
                            600: "#2563eb",
                            700: "#1d4ed8",
                            800: "#1e40af",
                            900: "#1e3a8a"
                        },
                        surface: {
                            950: "#0b1220",
                            900: "#111827",
                            800: "#1f2937",
                            700: "#374151"
                        },
                        accent: {
                            500: "#14b8a6",
                            400: "#2dd4bf",
                            300: "#5eead4"
                        }
                    },
                    boxShadow: {
                        soft: "0 10px 30px rgba(15, 23, 42, 0.35)",
                        glow: "0 0 0 1px rgba(96, 165, 250, 0.35), 0 18px 45px rgba(30, 64, 175, 0.28)"
                    },
                    keyframes: {
                        riseIn: {
                            "0%": { opacity: "0", transform: "translateY(12px) scale(0.985)" },
                            "100%": { opacity: "1", transform: "translateY(0) scale(1)" }
                        },
                        pulseSoft: {
                            "0%, 100%": { opacity: "1" },
                            "50%": { opacity: ".65" }
                        }
                    },
                    animation: {
                        riseIn: "riseIn .35s ease-out both",
                        pulseSoft: "pulseSoft 1.8s ease-in-out infinite"
                    }
                }
            }
        };
    </script>
    <style>
        :root {
            --surface-shell: radial-gradient(circle at 12% -8%, rgba(20, 184, 166, 0.16), transparent 38%), radial-gradient(circle at 95% 8%, rgba(59, 130, 246, 0.18), transparent 34%), #0b1220;
        }

        .saas-page-fade {
            animation: riseIn .36s ease-out both;
        }

        .saas-card {
            border: 1px solid rgb(30 41 59 / 0.95);
            background: linear-gradient(170deg, rgb(15 23 42 / 0.9), rgb(15 23 42 / 0.72));
            box-shadow: 0 12px 32px rgba(2, 6, 23, 0.34);
        }

        .saas-table-wrap {
            border: 1px solid rgb(30 41 59 / 0.95);
            border-radius: 1rem;
            overflow: hidden;
            background: rgb(2 6 23 / 0.28);
        }

        .saas-input,
        .saas-select,
        .saas-textarea {
            width: 100%;
            border-radius: 0.85rem;
            border: 1px solid rgb(51 65 85 / 1);
            background: rgb(2 6 23 / 0.66);
            color: rgb(241 245 249 / 1);
            font-size: 0.92rem;
            line-height: 1.35rem;
            padding: 0.68rem 0.82rem;
            transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        .saas-input::placeholder,
        .saas-textarea::placeholder {
            color: rgb(100 116 139 / 1);
        }

        .saas-input:focus,
        .saas-select:focus,
        .saas-textarea:focus {
            outline: none;
            border-color: rgb(45 212 191 / 0.9);
            box-shadow: 0 0 0 3px rgb(45 212 191 / 0.2);
            background: rgb(2 6 23 / 0.84);
        }

        .saas-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 0.8rem;
            font-size: 0.84rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, color 160ms ease;
        }

        .saas-btn:hover {
            transform: translateY(-1px);
        }

        .saas-btn-primary {
            border: 1px solid rgb(45 212 191 / 0.38);
            background: linear-gradient(140deg, rgb(20 184 166 / 0.3), rgb(37 99 235 / 0.3));
            color: rgb(204 251 241 / 1);
        }

        .saas-btn-primary:hover {
            border-color: rgb(45 212 191 / 0.68);
            background: linear-gradient(140deg, rgb(20 184 166 / 0.42), rgb(37 99 235 / 0.38));
        }

        .saas-btn-muted {
            border: 1px solid rgb(51 65 85 / 1);
            background: rgb(15 23 42 / 0.8);
            color: rgb(226 232 240 / 1);
        }

        .saas-btn-muted:hover {
            border-color: rgb(94 234 212 / 0.45);
            color: rgb(240 253 250 / 1);
        }

        .saas-btn-danger {
            border: 1px solid rgb(251 113 133 / 0.4);
            background: rgb(251 113 133 / 0.14);
            color: rgb(255 228 230 / 1);
        }

        .saas-btn-danger:hover {
            background: rgb(251 113 133 / 0.24);
            border-color: rgb(251 113 133 / 0.68);
        }

        .saas-empty {
            border: 1px dashed rgb(71 85 105 / 0.9);
            border-radius: 1rem;
            padding: 1.4rem;
            text-align: center;
            color: rgb(148 163 184 / 1);
            background: rgb(2 6 23 / 0.44);
        }

        :focus-visible {
            outline: 2px solid rgb(94 234 212 / 0.9);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-surface-950 font-sans text-slate-100 antialiased" style="background-image: var(--surface-shell);">
    <div class="relative min-h-screen">
        {% include "partials/sidebar.html" %}

        <div class="md:pl-72 transition-all duration-300" id="app-shell">
            {% include "partials/topbar.html" %}

            <main class="saas-page-fade px-4 pb-10 pt-6 sm:px-6 lg:px-8">
                {% block page_header %}{% endblock %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <div id="toast-container" class="pointer-events-none fixed right-4 top-4 z-[100] flex w-full max-w-sm flex-col gap-3" aria-live="polite" aria-atomic="true"></div>

    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
    <script src="{{ url_for('static', path='/js/toast.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
