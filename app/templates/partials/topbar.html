<header class="sticky top-0 z-20 border-b border-slate-800/80 bg-surface-950/70 backdrop-blur-xl">
    <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
            <button
                id="sidebar-open"
                class="inline-flex items-center rounded-lg border border-slate-700 bg-slate-800/80 p-2 text-slate-300 transition hover:border-slate-500 hover:text-white md:hidden"
                aria-label="Open sidebar"
            >
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5"/>
                </svg>
            </button>
            <button
                id="sidebar-toggle-desktop"
                class="hidden items-center rounded-lg border border-slate-700 bg-slate-800/80 p-2 text-slate-300 transition hover:border-slate-500 hover:text-white md:inline-flex"
                aria-label="Toggle sidebar"
            >
                <svg id="sidebar-toggle-icon" class="h-5 w-5 transition-transform duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5L3.75 9l4.5 4.5M3.75 9h16.5M15.75 19.5l4.5-4.5-4.5-4.5M20.25 15H3.75"/>
                </svg>
            </button>
            <div>
                <p class="text-xs uppercase tracking-[0.18em] text-teal-300/80">FastAPI</p>
                <h1 class="font-display text-sm font-semibold text-slate-100 sm:text-base">Inventory and Sales Dashboard</h1>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button class="saas-btn saas-btn-muted rounded-xl px-3 py-2 text-xs" type="button" aria-label="Export report data">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15.75V3m0 12.75l-3.75-3.75M12 15.75l3.75-3.75M4.5 15.75v1.5A2.25 2.25 0 0 0 6.75 19.5h10.5a2.25 2.25 0 0 0 2.25-2.25v-1.5"/>
                </svg>
                Export
            </button>
            <div class="inline-flex items-center gap-2 rounded-xl border border-emerald-500/40 bg-emerald-500/10 px-3 py-2 text-xs font-semibold text-emerald-200">
                <span class="h-2 w-2 rounded-full bg-emerald-300 animate-pulse"></span>
                Live
            </div>
        </div>
    </div>
</header>
