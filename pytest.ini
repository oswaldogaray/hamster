[pytest]
minversion = 8.0
addopts = -ra --strict-config --strict-markers --cov=app --cov-branch --cov-config=.coveragerc --cov-report=term-missing
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:pkg_resources
